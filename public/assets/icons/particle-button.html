<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level Up — Particle FX</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 130% 90% at 50% 55%,
        #180a28 0%, #0d041a 35%, #060008 100%);
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    }

    #vfx-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: screen;  /* black = transparent, bright particles add on top */
    }

    /* ── UI ─────────────────────────────────────────────── */
    .ui {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #5a4520;
      text-shadow: 0 0 20px rgba(200, 140, 0, 0.3);
    }

    /* ── Frame wrapper ───────────────────────────────────── */
    .frame {
      position: relative;
      padding: 6px;
    }

    /* Ambient radial halo */
    .frame::before {
      content: '';
      position: absolute;
      inset: -55px;
      background: radial-gradient(ellipse at center,
        rgba(255, 180, 0, 0.10) 0%,
        rgba(200, 90,  0, 0.05) 40%,
        transparent 70%);
      border-radius: 50%;
      animation: halo 3.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes halo {
      0%, 100% { opacity: 0.55; transform: scale(0.94); }
      50%       { opacity: 1.00; transform: scale(1.06); }
    }

    /* Ornamental corners */
    .corner {
      position: absolute;
      width: 14px; height: 14px;
      border: 1.5px solid #7a5c18;
      transition: border-color .3s;
    }
    .corner.tl { top: -4px; left: -4px;   border-right: none; border-bottom: none; }
    .corner.tr { top: -4px; right: -4px;  border-left:  none; border-bottom: none; }
    .corner.bl { bottom: -4px; left: -4px;  border-right: none; border-top: none; }
    .corner.br { bottom: -4px; right: -4px; border-left:  none; border-top: none; }

    .frame:hover .corner { border-color: #c8920a; }

    /* ── The Button ──────────────────────────────────────── */
    #btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 18px 56px;
      font-family: inherit;
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #f0d060;
      cursor: pointer;
      border: 1.5px solid #6a4c10;
      border-radius: 2px;
      outline: none;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;

      background:
        linear-gradient(180deg,
          rgba(255, 210, 0, 0.07) 0%, transparent 28%,
          transparent 72%, rgba(255, 180, 0, 0.04) 100%),
        linear-gradient(145deg,
          #1b0d03 0%, #2e1605 28%, #1a0c02 55%,
          #271305 78%, #1b0d03 100%);

      box-shadow:
        0 0 0 1px rgba(200, 150, 0, 0.12),
        0 0 20px rgba(255, 150, 0, 0.20),
        0 0 60px rgba(200, 100, 0, 0.08),
        inset 0  1px 0 rgba(255, 210, 0, 0.24),
        inset 0 -1px 0 rgba(60, 28, 0, 0.72);

      text-shadow:
        0 0  8px rgba(255, 215, 0, 0.88),
        0 0 18px rgba(255, 160, 0, 0.58),
        0  1px 2px rgba(0, 0, 0, 0.95);

      transition:
        color .25s, border-color .25s, box-shadow .25s,
        transform .12s, text-shadow .25s;
    }

    /* Metallic shimmer sweep on hover */
    #btn::before {
      content: '';
      position: absolute;
      top: 0; left: -150%;
      width: 70%; height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 255, 180, 0.04) 30%,
        rgba(255, 255, 180, 0.18) 50%,
        rgba(255, 255, 180, 0.04) 70%,
        transparent 100%);
      transform: skewX(-18deg);
      pointer-events: none;
    }
    #btn:hover::before { animation: shimmer .6s ease forwards; }
    @keyframes shimmer { to { left: 160%; } }

    /* Gentle inner pulse */
    #btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(255, 200, 0, 0.07) 0%, transparent 68%);
      animation: innerPulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes innerPulse {
      0%, 100% { opacity: 0.38; }
      50%       { opacity: 1.00; }
    }

    /* Decorative diamond icons */
    .ic {
      font-size: 0.75em;
      opacity: 0.88;
      filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.75));
      flex-shrink: 0;
      transition: filter .25s, transform .25s;
    }

    /* Hover state */
    #btn:hover {
      color: #ffffff;
      border-color: #c8a020;
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(255, 215, 0, 0.44),
        0 0 30px rgba(255, 200, 0, 0.50),
        0 0 75px rgba(255, 140, 0, 0.24),
        0 0 140px rgba(200,  80, 0, 0.11),
        0 8px 24px rgba(0, 0, 0, 0.55),
        inset 0  1px 0 rgba(255, 255, 100, 0.40),
        inset 0 -1px 0 rgba(60, 28, 0, 0.72);
      text-shadow:
        0 0 12px rgba(255, 255, 255, 1.0),
        0 0 26px rgba(255, 215, 0, 0.92),
        0 0 55px rgba(255, 160, 0, 0.68);
    }
    #btn:hover .ic {
      filter: drop-shadow(0 0 7px rgba(255, 215, 0, 1));
      transform: rotate(45deg) scale(1.1);
    }

    /* Active / press */
    #btn:active {
      transform: translateY(1px) scale(0.975);
      transition-duration: 0.06s;
      box-shadow:
        0 0 0 1px rgba(255, 215, 0, 0.58),
        0 0 22px rgba(255, 200, 0, 0.58),
        inset 0 2px 10px rgba(0, 0, 0, 0.68);
    }

    .tagline {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #30240c;
    }
  </style>
</head>
<body>

<canvas id="vfx-canvas"></canvas>

<div class="ui">
  <p class="eyebrow">Character Screen</p>

  <div class="frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <button id="btn">
      <span class="ic">✦</span>
      Level&nbsp;Up
      <span class="ic">✦</span>
    </button>
  </div>

  <p class="tagline">Click to unlock your potential</p>
</div>

<!-- Three.js r160 via CDN (ES modules + importmap) -->
<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE          from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

/* ════════════════════════════════════════════════════════════
   RENDERER
════════════════════════════════════════════════════════════ */

const canvas   = document.getElementById('vfx-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);  // solid black — screen blend mode makes it transparent
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 6;

/* Post-processing: render → bloom → output */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.7,    // strength  — "the video-game magic"
  0.80,   // radius
  0.04    // threshold — low so dim ambient motes still glow
);
composer.addPass(bloom);
composer.addPass(new OutputPass());   // correct sRGB conversion

/* ════════════════════════════════════════════════════════════
   PARTICLE SHADERS
════════════════════════════════════════════════════════════ */

const VS = /* glsl */`
  attribute float aSize;
  attribute float aLife;    // 1.0 = just born → 0.0 = dead
  attribute vec3  aColor;

  varying float vLife;
  varying vec3  vColor;

  void main() {
    vLife  = aLife;
    vColor = aColor;

    // Clip dead particles entirely
    if (aLife <= 0.001) {
      gl_Position  = vec4(10.0, 10.0, 10.0, 1.0);
      gl_PointSize = 0.0;
      return;
    }

    vec4 mv = modelViewMatrix * vec4(position, 1.0);

    // Envelope: fast ramp-up (power < 1), graceful sine decay
    float env    = sin(pow(aLife, 0.42) * 3.14159);
    gl_PointSize = max(0.0, aSize * env) * (950.0 / -mv.z);
    gl_Position  = projectionMatrix * mv;
  }
`;

const FS = /* glsl */`
  varying float vLife;
  varying vec3  vColor;

  void main() {
    if (vLife <= 0.001) discard;

    vec2  uv   = gl_PointCoord - 0.5;
    float r    = length(uv);
    if (r > 0.5) discard;

    // ── Soft radial glow disc ──────────────────────────────
    float glow  = pow(max(0.0, 1.0 - r * 2.0), 2.2);
    float alpha = glow * vLife;

    // ── 4-armed star sparkle (axis-aligned + 45° diagonals) ─
    float arm = max(
      pow(max(0.0, 1.0 - abs(uv.x) * 13.5), 3.0),
      pow(max(0.0, 1.0 - abs(uv.y) * 13.5), 3.0)
    );
    float d45 = max(
      pow(max(0.0, 1.0 - abs(uv.x + uv.y) * 10.5), 3.0),
      pow(max(0.0, 1.0 - abs(uv.x - uv.y) * 10.5), 3.0)
    );
    float sparkle = (arm * 0.55 + d45 * 0.32) * vLife;

    // ── Hot white core ─────────────────────────────────────
    float core = max(0.0, 1.0 - r * 9.5);

    vec3 col = vColor
      + core    * vec3(0.9,  0.75, 0.35)   // warm white brightening
      + sparkle * vec3(1.0,  0.88, 0.45);  // gold sparkle arms

    gl_FragColor = vec4(col, alpha + sparkle * 0.58);
  }
`;

/* ════════════════════════════════════════════════════════════
   PARTICLE POOL  (CPU-driven, GPU-rendered)
════════════════════════════════════════════════════════════ */

const N      = 14000;

// CPU buffers (simulation state)
const bPos   = new Float32Array(N * 3);
const bVel   = new Float32Array(N * 3);   // velocity, not sent to GPU
const bLife  = new Float32Array(N);       // 0 = dead, 1 = newborn
const bMaxL  = new Float32Array(N);       // max lifetime in seconds
const bSize  = new Float32Array(N);
const bColor = new Float32Array(N * 3);
const bGrav  = new Float32Array(N);       // per-particle gravity scale

// GPU attributes
const geo    = new THREE.BufferGeometry();
const aPos2  = new THREE.BufferAttribute(bPos,   3); aPos2.usage  = THREE.DynamicDrawUsage;
const aLife2 = new THREE.BufferAttribute(bLife,  1); aLife2.usage = THREE.DynamicDrawUsage;
const aSz    = new THREE.BufferAttribute(bSize,  1); aSz.usage    = THREE.DynamicDrawUsage;
const aClr   = new THREE.BufferAttribute(bColor, 3); aClr.usage   = THREE.DynamicDrawUsage;

geo.setAttribute('position', aPos2);
geo.setAttribute('aLife',    aLife2);
geo.setAttribute('aSize',    aSz);
geo.setAttribute('aColor',   aClr);

const mat = new THREE.ShaderMaterial({
  vertexShader:   VS,
  fragmentShader: FS,
  transparent:    true,
  depthWrite:     false,
  blending:       THREE.AdditiveBlending,
});

scene.add(new THREE.Points(geo, mat));

/* Pool cursor — cycles so old/dead slots get reused */
let cursor = 0;

function spawn(x, y, z,  vx, vy, vz,  life, size,  r, g, b,  grav = 1.0) {
  const i = cursor;
  cursor = (cursor + 1) % N;

  bPos[i*3]     = x;  bPos[i*3+1]   = y;  bPos[i*3+2]   = z;
  bVel[i*3]     = vx; bVel[i*3+1]   = vy; bVel[i*3+2]   = vz;
  bLife[i]      = 1.0;
  bMaxL[i]      = life;
  bSize[i]      = size;
  bColor[i*3]   = r;  bColor[i*3+1] = g;  bColor[i*3+2] = b;
  bGrav[i]      = grav;
}

/* ── Gold colour palette ─────────────────────────────────── */
const PALETTE = [
  [1.00, 0.84, 0.00],   // pure gold     #FFD700
  [1.00, 0.65, 0.00],   // amber         #FFA500
  [1.00, 0.93, 0.48],   // pale gold
  [1.00, 1.00, 0.72],   // near-white
  [1.00, 0.42, 0.00],   // deep amber
  [0.88, 0.54, 0.08],   // bronze
];
function randGold(dim = 1.0) {
  const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  return [c[0]*dim, c[1]*dim, c[2]*dim];
}
const rg = () => randGold(0.88 + Math.random() * 0.12);

/* ════════════════════════════════════════════════════════════
   BUTTON BOUNDS  (world-space, updated on init + resize)
════════════════════════════════════════════════════════════ */

let btnBounds = { xMin: -1, xMax: 1, yMin: -0.5, yMax: 0.5 };

function updateBtnBounds() {
  const rect = btn.getBoundingClientRect();
  const tl   = screenToWorld(rect.left,  rect.top);
  const br   = screenToWorld(rect.right, rect.bottom);
  // world y is inverted relative to screen y
  btnBounds = { xMin: tl.x, xMax: br.x, yMin: br.y, yMax: tl.y };
}

/* ════════════════════════════════════════════════════════════
   SPAWN BEHAVIOURS
════════════════════════════════════════════════════════════ */

/** Spawn one particle at a random position inside the button,
 *  drifting in a fully random direction at a slow speed. */
function spawnInsideButton() {
  const rect  = btn.getBoundingClientRect();
  const sx    = rect.left + Math.random() * rect.width;
  const sy    = rect.top  + Math.random() * rect.height;
  const wp    = screenToWorld(sx, sy);

  const angle = Math.random() * Math.PI * 2;
  const speed = 0.06 + Math.random() * 0.14;   // slow drift
  const lt    = 0.6  + Math.random() * 1.0;

  const [r, g, b] = rg();
  spawn(
    wp.x, wp.y, 0,
    Math.cos(angle) * speed,
    Math.sin(angle) * speed,
    0,
    lt,
    0.022 + Math.random() * 0.048,
    r, g, b,
    0   // no gravity
  );
}

/* 1 ── Click burst — fill the button with particles at once ── */
function burst() {
  for (let i = 0; i < 350; i++) spawnInsideButton();
}

/* 2 ── Hover — steady stream of drifting motes ──────────────── */
let hovering   = false;
let hoverTimer = 0;

function spawnHover(dt) {
  hoverTimer += dt;
  if (hoverTimer < 0.016) return;
  hoverTimer = 0;
  for (let i = 0; i < 6; i++) spawnInsideButton();
}

/* 3 ── Idle — very gentle trickle (always on) ────────────────── */
let idleTimer = 0;

function spawnIdle(dt) {
  idleTimer += dt;
  if (idleTimer < 0.06) return;
  idleTimer = 0;
  spawnInsideButton();
  spawnInsideButton();
}

/* ════════════════════════════════════════════════════════════
   PHYSICS UPDATE
════════════════════════════════════════════════════════════ */

const clock = new THREE.Clock();

function update(dt) {
  spawnIdle(dt);
  if (hovering) spawnHover(dt);

  for (let i = 0; i < N; i++) {
    if (bLife[i] <= 0) continue;

    bLife[i] -= dt / bMaxL[i];
    if (bLife[i] <= 0) { bLife[i] = 0; continue; }

    // Hard kill if particle exits button world bounds
    const px = bPos[i*3], py = bPos[i*3+1];
    if (px < btnBounds.xMin || px > btnBounds.xMax ||
        py < btnBounds.yMin || py > btnBounds.yMax) {
      bLife[i] = 0; continue;
    }

    bPos[i*3]   += bVel[i*3]   * dt;
    bPos[i*3+1] += bVel[i*3+1] * dt;
    bPos[i*3+2] += bVel[i*3+2] * dt;

    bVel[i*3+1] -= 1.65 * dt * bGrav[i];

    // Drag on all axes — particles decelerate to a stop at ~30 px
    const drag = 1.0 - 0.62 * dt;
    bVel[i*3]   *= drag;
    bVel[i*3+1] *= drag;
    bVel[i*3+2] *= drag;
  }

  // Upload updated buffers to GPU
  aPos2.needsUpdate  = true;
  aLife2.needsUpdate = true;
  aSz.needsUpdate    = true;
  aClr.needsUpdate   = true;
}

/* ════════════════════════════════════════════════════════════
   RENDER LOOP
════════════════════════════════════════════════════════════ */

(function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  composer.render();
})();

/* ════════════════════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════════════════════ */

/** Convert screen pixel coords → Three.js world coords at z=0 */
function screenToWorld(sx, sy) {
  const v = new THREE.Vector3(
    (sx / window.innerWidth)  * 2 - 1,
   -(sy / window.innerHeight) * 2 + 1,
    0.5
  );
  v.unproject(camera);
  const dir = v.sub(camera.position).normalize();
  const t   = -camera.position.z / dir.z;
  return camera.position.clone().addScaledVector(dir, t);
}

const btn = document.getElementById('btn');

btn.addEventListener('click', () => burst());

btn.addEventListener('mouseenter', () => { hovering = true;  });
btn.addEventListener('mouseleave', () => { hovering = false; });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  updateBtnBounds();
});

// Initialise bounds after first layout
requestAnimationFrame(updateBtnBounds);
</script>
</body>
</html>
